name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Astro check
        run: npm run check

      - name: Lint (Biome)
        run: npm run lint

      - name: i18n parity check (src/pages vs src/pages/fr)
        run: npm run check:i18n

      - name: Build
        run: npm run build
